name: Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Deploy to VPS
        run: |
          APP_NAME="AddaLiveBackend"
          SERVER_HOST="178.128.26.45"

          ssh -o StrictHostKeyChecking=no root@$SERVER_HOST "
            export PATH=/root/.nvm/versions/node/v20.19.5/bin:\$PATH &&  # Use Node path for Yarn
            cd /var/www/$APP_NAME &&
            git stash &&
            git pull origin main &&
            yarn install &&
            yarn build &&
            if pm2 describe $APP_NAME > /dev/null 2>&1; then
              echo \"Restarting existing pm2 process: $APP_NAME\" &&
              pm2 restart $APP_NAME --update-env
            else
              echo \"Starting new pm2 process: $APP_NAME\" &&
              pm2 start yarn --name $APP_NAME --interpreter bash -- start
            fi &&
            pm2 save &&
            echo \"Successfully deployed $APP_NAME with pm2\"
          "
